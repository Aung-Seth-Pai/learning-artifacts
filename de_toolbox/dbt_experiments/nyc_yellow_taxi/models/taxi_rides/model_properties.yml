version: 2

models:
  - name: taxi_rides_raw
    description: Initial import of the NYC Yellow Taxi trip data from Parquet source
    access: public


  - name: stg_taxi_rides
    description: Cleaned and transformed staging model for NYC Yellow Taxi rides
    access: public
    columns:
      - name: vendorid
        description: "A code indicating the TPEP provider that provided the record."
        tests:
          - not_null  # Ensures every row has a provider ID

      - name: tpep_pickup_datetime
        description: "The date and time when the meter was engaged."
        tests:
          - not_null

      - name: Passenger_count
        description: "Number of passengers in the vehicle."
        tests:
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4, 5, 6] # Flags if a ride has 0 or 100 people
                quote: false

      - name: Trip_distance
        description: "The elapsed trip distance in miles reported by the taximeter."
        # You could add a custom test here later to ensure this is > 0